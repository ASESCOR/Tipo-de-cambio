name: Actualizar y publicar monitor cambiario

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "47 23 * * *"
      timezone: "America/La_Paz"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v6

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Consultar cotizaciones y actualizar el histórico
        id: update
        continue-on-error: true
        run: node scripts/update-data.mjs

      - name: Advertir si la API no respondió
        if: steps.update.outcome == 'failure'
        run: echo "::warning::No se actualizó data/history.json; se publicará el último dato disponible."

      - name: Guardar el histórico actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/history.json

          if git diff --cached --quiet; then
            echo "No existen cambios nuevos"
          else
            git commit -m "Actualizar cotizaciones cambiarias"

            echo "Sincronizando con la rama principal..."
            git pull --rebase origin main

            echo "Guardando el histórico actualizado..."
            git push origin HEAD:main
          fi

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparar los archivos del sitio
        uses: actions/upload-pages-artifact@v4
        with:
          path: "."

      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
